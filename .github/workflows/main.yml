name: Teste de HTML (verificar H1)

on:
  push:
    branches: ["main"]

jobs:
  verificar-h1:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Verificar se existe <h1>
        run: |
          if grep -Eiq "<h1[^>]*>" index.html; then
            echo " Encontramos a tag <h1>!"
          else
            echo " Não encontramos a tag <h1>!"
            exit 1
          fi
